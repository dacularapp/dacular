name: dacular zip

# Builds dacular.zip — the dacular source bundle the Millrace app downloads, then
# `mojo build`s on-device. See scripts/package_dacular.sh. Mirrors headgate's
# headgate-zip.yml, but dacular has no FFI/sibling-repo deps yet, so there's just
# one checkout and no flare shims / node build.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths: ["scripts/package_dacular.sh", ".github/workflows/dacular-zip.yml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  zip:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: pixi.toml

      # Compile-check the bundle before shipping it.
      - name: Build dacular
        run: pixi run build

      - name: Package dacular.zip
        run: bash scripts/package_dacular.sh "$GITHUB_WORKSPACE/dacular.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: dacular-zip
          path: dacular.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dacular.zip
